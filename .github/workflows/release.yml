name: Release HandBoard

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept SDK Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build Debug & Release APK
        run: |
          gradle assembleDebug
          gradle assembleRelease

      - name: Get tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare APKs
        run: |
          mkdir -p release_apks
          cp app/build/outputs/apk/debug/app-debug.apk release_apks/HandBoard-${{ steps.tag.outputs.VERSION }}-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk release_apks/HandBoard-${{ steps.tag.outputs.VERSION }}-release-unsigned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HandBoard ${{ steps.tag.outputs.VERSION }}"
          generate_release_notes: true
          body: |
            ## HandBoard ${{ steps.tag.outputs.VERSION }}

            ### 📥 Installation
            - Download `HandBoard-v...-debug.apk` to install right away (Recommended for general testing).
            - Download `HandBoard-v...-release-unsigned.apk` if you intend to sign it yourself.
            
            ### ✨ Fixed in this update:
            - **Inline Search Working:** Search bar now acts as an overlay. Type directly from the keyboard without losing focus.
            - **Dictionary Import:** Added file picker in settings to import `.txt` / `.dict` files.
            - Added Release Build targets to GitHub actions.
          files: release_apks/*.apk
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
