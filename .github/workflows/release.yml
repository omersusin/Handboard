name: Release HandBoard

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Accept Android SDK Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Rename APKs
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp app/build/outputs/apk/debug/app-debug.apk HandBoard-${TAG}-debug.apk
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk HandBoard-${TAG}-release.apk
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk HandBoard-${TAG}-release.apk
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: HandBoard ${{ github.ref_name }}
          body: |
            ## HandBoard ${{ github.ref_name }}

            ### 📥 Download
            - **Debug APK** — install directly, no signing needed
            - **Release APK** — minified, optimized

            ### ✨ Features
            - 4 keyboard layouts (QWERTY, Right Hand, Left Hand, Thumb)
            - 3600+ emojis with skin tone support
            - Word prediction with Trie + Bigram engine
            - Clipboard history with image support
            - Customizable size, position, and layout
            - Material You theming (Android 12+)
            - Android 7.0+ support

            ### 🛠️ Setup
            1. Install APK
            2. Open HandBoard → Enable → Select as keyboard
            3. Customize in Settings
          files: |
            HandBoard-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
