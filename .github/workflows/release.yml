name: Release HandBoard

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Get version tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk HandBoard-${{ steps.tag.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HandBoard ${{ steps.tag.outputs.VERSION }}"
          body: |
            ## HandBoard ${{ steps.tag.outputs.VERSION }}
            
            ### 📥 Install
            1. Download the APK below
            2. Install on your Android device
            3. Open HandBoard → Enable → Select as keyboard
            
            ### ✨ What's Included
            - 4 keyboard layouts (QWERTY, Right Hand, Left Hand, Thumb)
            - 3600+ emojis (Google emoji2 picker)
            - Word prediction (Trie + Bigram)
            - Clipboard history with image support
            - Customizable size, position, layout
            - Material You theming (Android 12+)
            - Supports Android 7.0+
          files: HandBoard-${{ steps.tag.outputs.VERSION }}.apk
          draft: false
          prerelease: false
